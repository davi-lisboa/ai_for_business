<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Listagem de Cadastros</title>
    <style>
        body{font-family:Arial,Helvetica,sans-serif;background:#f5f5f5;margin:0;padding:2rem;}
        .wrapper{background:#fff;padding:2rem;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.1);}
        table{width:100%;border-collapse:collapse;margin-top:1rem;}
        th,td{border:1px solid #ddd;padding:.6rem;text-align:left;}
        th{background:#0066cc;color:#fff;}
        a{color:#0066cc;text-decoration:none;}
    </style>
</head>
<body>

<div class="wrapper">
    <h2>Cadastros já realizados</h2>
    <a href="/">← Voltar ao formulário</a>

    {% if registros %}
        <table>
            <thead>
                <tr>
                    <th>Data/Hora</th>
                    <th>Nome</th>
                    <th>E‑mail</th>
                    <th>Commodities</th>
                </tr>
            </thead>
            <tbody>
                {% for r in registros %}
                <tr>
                    <td>{{ r.data_hora }}</td>
                    <td>{{ r.nome }}</td>
                    <td>{{ r.email }}</td>
                    <td>{{ r.commodities.replace('|', ', ') }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    {% else %}
        <p>Nenhum cadastro encontrado.</p>
    {% endif %}
</div>

</body>
</html>
